name: Test Bash Script

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

jobs:
  test:
    name: Run Script
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1 # https://github.com/actions/checkout

      - name: Run Bash Script
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          mkdir example-project
          mv init.sh example-project/init.sh
          cd example-project
          chmod +x init.sh
          ./init.sh "TestApp" "TestNamespace" "$BRANCH_NAME" "12345" "23456" "34567" "45678"
